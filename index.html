<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Mapa Interativo - Envio de Coordenadas</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.5/dist/leaflet.css"
    integrity="sha256-sA+e2l5xY1vL7k+d3j9RnFxkU2F2eoE2Q7hK9F0hRE4=" crossorigin=""/>
  
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    #map { height: 80vh; width: 100%; }
    #controls { padding: 10px; text-align: center; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div id="controls">
    <button id="submit-coords">Submeter coordenadas</button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.5/dist/leaflet.js"
    integrity="sha256-QV0F7RnJt5NQXbd0V+2xA7G3bN0YyOYtzrJZgOAI2S4=" crossorigin=""></script>

  <script>
    // ==============================
    // CONFIGURAÇÃO
    // ==============================
    // Substitua pelo URL do seu Web App do Google Apps Script
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxxyQpcR_Jof_OW02aarSo4Y4BfLvg-x3G7W_ZEzjUDkj0bH7Bspf_mecKWSzxxUdY/exec";

    let currentLat = null;
    let currentLng = null;

    // ==============================
    // INICIALIZAÇÃO DO MAPA
    // ==============================
    const map = L.map('map').setView([38.716, -9.140], 13); // Coordenadas de Lisboa como padrão

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let marker = null;

    // ==============================
    // CAPTURA DO CLIQUE NO MAPA
    // ==============================
    map.on('click', function(e) {
      currentLat = e.latlng.lat.toFixed(6);
      currentLng = e.latlng.lng.toFixed(6);

      // Remove marcador anterior
      if(marker) map.removeLayer(marker);

      // Adiciona novo marcador
      marker = L.marker([currentLat, currentLng]).addTo(map);

      alert("Coordenadas selecionadas:\nLat: " + currentLat + "\nLng: " + currentLng);
    });

    // ==============================
    // ENVIO DAS COORDENADAS
    // ==============================
    document.getElementById("submit-coords").addEventListener("click", function() {
      if(currentLat === null || currentLng === null) {
        alert("Por favor, selecione um ponto no mapa antes de submeter.");
        return;
      }

      const url = `${WEB_APP_URL}?lat=${currentLat}&lng=${currentLng}`;

      fetch(url)
        .then(response => response.text())
        .then(data => {
          alert("Coordenadas enviadas com sucesso!");
          console.log(data);
          // Limpa variáveis e marcador
          currentLat = null;
          currentLng = null;
          if(marker) map.removeLayer(marker);
        })
        .catch(err => {
          console.error(err);
          alert("Erro ao enviar coordenadas. Tente novamente.");
        });
    });
  </script>

</body>
</html>
