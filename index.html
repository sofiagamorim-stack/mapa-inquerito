<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="utf-8">
<title>Consulta Pública Carta BIP/ZIP</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
  font-family: "Times New Roman";
  margin:20px;
}

#map{
  height:500px;
  width:60%;
  margin-bottom:10px;
}

#coords{
  width:300px;
}

button{
  margin-top:10px;
  padding:10px;
  font-size:16px;
  cursor:pointer;
}

</style>

</head>

<body>

<h2>Consulta Pública Carta BIP/ZIP</h2>

<div id="form-container">

<h3>1. Responda ao questionário</h3>

<iframe
src="https://docs.google.com/forms/d/e/1FAIpQLSe75KJzngsSvGPypyHib4Egd1XSce4Mn719bYPZY5ghTPh8Yg/viewform?embedded=true"
width="1000"
height="600"
frameborder="0">
A carregar…
</iframe>

</div>

<hr>

<h3>2. Assinale um local no mapa</h3>

<p>Clique no mapa para indicar o local a considerar.</p>

<div id="map"></div>

<p><b>Coordenadas selecionadas:</b></p>

<input id="coords" type="text" readonly>

<br>

<button id="submit-coords">Submeter coordenadas</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =============================
// MAPA
// =============================

var map = L.map('map').setView([38.7223,-9.1393],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

var marker;

let currentLat = null;
let currentLng = null;


// =============================
// CLIQUE NO MAPA
// =============================

map.on('click',function(e){

  if(marker){
    map.removeLayer(marker);
  }

  marker = L.marker(e.latlng).addTo(map);

  currentLat = e.latlng.lat.toFixed(6);
  currentLng = e.latlng.lng.toFixed(6);

  document.getElementById("coords").value =
  currentLat + "," + currentLng;

});


// =============================
// ENVIO DAS COORDENADAS
// =============================

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbxa6qdGCHW-vEvQEb2YCXKLXP8SjV28Cqpkm7ZuARbUgYwoxeMrkO9rGfnGs0gzuP4V/exec";


document.getElementById("submit-coords").addEventListener("click",function(){

  if(currentLat === null || currentLng === null){
    alert("Selecione um ponto no mapa primeiro.");
    return;
  }

  fetch(WEB_APP_URL + "?lat=" + currentLat + "&lng=" + currentLng)

  .then(response => response.text())

  .then(data => {

    alert("Coordenadas enviadas com sucesso!");

    console.log(data);

    // limpar marcador
    if(marker){
      map.removeLayer(marker);
    }

    document.getElementById("coords").value="";

    currentLat=null;
    currentLng=null;

  })

  .catch(error => {

    console.error(error);

    alert("Erro ao enviar coordenadas.");

  });

});

</script>

</body>
</html>
