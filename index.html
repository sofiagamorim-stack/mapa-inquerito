<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Consulta Pública Carta BIP/ZIP</title>

 <div id="form-container">
  <h2>Responda às questões do questionário e em seguida assinale um local no mapa.</h2>
 
  <h2> Envie as respostas do questionário e submeta as coordenadas indicadas no mapa</h2>
 
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe75KJzngsSvGPypyHib4Egd1XSce4Mn719bYPZY5ghTPh8Yg/viewform?embedded=true" width="1000" height="600" frameborder="0" marginheight="0" marginwidth="0">A carregar…</iframe>
</div> 
 
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Times New Roman;
margin:20px;
}

#map{
height:500px;
width:60%;
}

button{
margin-top:10px;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Assinale o local a considerar no mapa</h2>

<p>Clique no mapa para indicar o local a considerar.</p>

<div id="map"></div>

<p>Coordenadas selecionadas:</p>

<input id="coords" type="text" readonly style="width:300px">

<br>

<button onclick="enviar()">Submeter coordenadas</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([38.7223,-9.1393],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

var marker;

map.on('click',function(e){

if(marker){
map.removeLayer(marker);
}

marker = L.marker(e.latlng).addTo(map);

var coords = e.latlng.lat.toFixed(6)+","+e.latlng.lng.toFixed(6);

document.getElementById("coords").value = coords;

});

function enviar(){

var c = document.getElementById("coords").value;

if(c==""){
alert("Selecione um ponto no mapa");
return;
}

alert("Coordenadas registadas: "+c);

}

</script>

</body>


</html>

<script>
  // Substitua pelo URL do seu Web App
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxLj8gg3gWJcuooo5iDktu-xS1pqpcicRa9jBkuiyKF80jY-eIhLluCdDwZYwgTLeNz/exec";

  // Captura o clique no mapa
  map.on('click', function(e) {
    let lat = e.latlng.lat.toFixed(6);
    let lng = e.latlng.lng.toFixed(6);

    // Monta URL com parâmetros
    let url = `${WEB_APP_URL}?lat=${lat}&lng=${lng}`;

    // Envia coordenadas para a planilha
    fetch(url)
      .then(response => response.text())
      .then(data => {
        console.log(data); // Feedback no console
        alert("Coordenadas enviadas com sucesso!");
      })
      .catch(err => {
        console.error(err);
        alert("Erro ao enviar coordenadas.");
      });
  });
</script>
