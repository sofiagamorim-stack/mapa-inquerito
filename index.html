<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Consulta Pública Carta BIP/ZIP</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body { font-family: Times New Roman; margin:20px; }
#map { height:500px; width:60%; margin-bottom:10px; }
#coords { width:300px; margin-top:5px; }
form { width:1000px; margin-bottom:20px; }
input, textarea { width:100%; padding:6px; margin:6px 0; font-size:16px; }
button { margin-top:10px; padding:10px; font-size:16px; }
#message { margin-top:5px; color:green; font-style:italic; }
</style>
</head>
<body>

<h2>Responda às questões do questionário</h2>

<form id="myForm">
  <label>Nome:</label>
  <input type="text" name="nome" required>

  <label>Email:</label>
  <input type="email" name="email" required>

  <label>Comentário:</label>
  <textarea name="comentario" rows="4"></textarea>

  <label>Latitude:</label>
  <input type="text" id="latField" name="latitude" readonly required>

  <label>Longitude:</label>
  <input type="text" id="lngField" name="longitude" readonly required>

  <button type="submit">Enviar Formulário</button>
</form>

<div id="message"></div>

<h2>Assinale o local a considerar no mapa</h2>
<p>Clique no mapa para indicar o local.</p>

<div id="map"></div>
<p>Coordenadas selecionadas:</p>
<input id="coords" type="text" readonly>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([38.7223,-9.1393],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

var marker, lat=null, lng=null;

map.on('click', function(e){
  if(marker) map.removeLayer(marker);
  marker = L.marker(e.latlng).addTo(map);

  lat = e.latlng.lat.toFixed(6);
  lng = e.latlng.lng.toFixed(6);

  document.getElementById("coords").value = lat+","+lng;
  document.getElementById("latField").value = lat;
  document.getElementById("lngField").value = lng;

  document.getElementById("message").textContent = "Coordenadas selecionadas automaticamente!";
});

// =======================
// ENVIO PARA GOOGLE SHEETS
// =======================
document.getElementById("myForm").addEventListener("submit", function(e){
  e.preventDefault();

  var formData = new FormData(this);

  fetch("https://script.google.com/macros/s/AKfycbwQ-Dz6KUTHPEgFvRjPMlQkn5kTWx8luGIUKCTZpkVeoxE1_oVL5NDkSf66lTP_E2Sg/exec", { // Substitua pelo link do Apps Script
    method: "POST",
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    if(data.result === "success") {
      document.getElementById("message").textContent = "Formulário enviado com sucesso!";
      this.reset();
      document.getElementById("coords").value = "";
      if(marker) map.removeLayer(marker);
      lat=null; lng=null;
    } else {
      document.getElementById("message").textContent = "Erro ao enviar formulário.";
    }
  })
  .catch(err => {
    console.error(err);
    document.getElementById("message").textContent = "Erro ao enviar formulário.";
  });
});
</script>
</body>
</html>
