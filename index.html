<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Consulta Pública Carta BIP/ZIP</title>

 <div id="form-container">
  <h2>Responda às questões do questionário e em seguida assinale um local no mapa.</h2>
 
  <h2> Envie as respostas do questionário e submeta as coordenadas indicadas no mapa</h2>
 
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe75KJzngsSvGPypyHib4Egd1XSce4Mn719bYPZY5ghTPh8Yg/viewform?embedded=true" width="1000" height="600" frameborder="0" marginheight="0" marginwidth="0">A carregar…</iframe>
</div> 
 
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Times New Roman;
margin:20px;
}

#map{
height:500px;
width:60%;
}

button{
margin-top:10px;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Assinale o local a considerar no mapa</h2>

<p>Clique no mapa para indicar o local a considerar.</p>

<div id="map"></div>

<p>Coordenadas selecionadas:</p>

<input id="coords" type="text" readonly style="width:300px">

<br>

<button onclick="enviar()">Submeter coordenadas</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([38.7223,-9.1393],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

var marker;

map.on('click',function(e){

if(marker){
map.removeLayer(marker);
}

marker = L.marker(e.latlng).addTo(map);

var coords = e.latlng.lat.toFixed(6)+","+e.latlng.lng.toFixed(6);

document.getElementById("coords").value = coords;

});

function enviar(){

var c = document.getElementById("coords").value;

if(c==""){
alert("Selecione um ponto no mapa");
return;
}

alert("Coordenadas registadas: "+c);

}

</script>

</body>


</html>

<script>
  // URL do Web App do Google Sheets (Apps Script)
  const WEB_APP_URL = "COLE_AQUI_O_SEU_WEB_APP_URL";

  // Variáveis para armazenar a última coordenada clicada
  let currentLat = null;
  let currentLng = null;

  // Captura o clique no mapa, mas só guarda as coordenadas
  map.on('click', function(e) {
      currentLat = e.latlng.lat.toFixed(6);
      currentLng = e.latlng.lng.toFixed(6);
      alert("Coordenadas selecionadas:\nLat: " + currentLat + "\nLng: " + currentLng);
  });

  // Envia coordenadas quando o botão for clicado
  document.getElementById("submit-coords").addEventListener("click", function() {
      if(currentLat === null || currentLng === null){
          alert("Por favor, selecione um ponto no mapa antes de submeter.");
          return;
      }

      const url = `${WEB_APP_URL}?lat=${currentLat}&lng=${currentLng}`;

      fetch(url)
        .then(response => response.text())
        .then(data => {
          alert("Coordenadas enviadas com sucesso!");
          console.log(data);
          // Limpa as coordenadas armazenadas, se quiser
          currentLat = null;
          currentLng = null;
        })
        .catch(err => {
          console.error(err);
          alert("Erro ao enviar coordenadas. Tente novamente.");
        });
  });
</script>
