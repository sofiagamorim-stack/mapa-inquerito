<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Mapa do Inquérito</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:20px;
}

#map{
height:500px;
width:100%;
}

button{
margin-top:10px;
padding:10px;
font-size:16px;
}

</style>

</head>

<body>

<h2>Marque o local no mapa</h2>

<p>Clique no mapa para indicar o local relevante.</p>

<div id="map"></div>

<p>Coordenadas selecionadas:</p>

<input id="coords" type="text" readonly style="width:300px">

<br>

<button onclick="enviar()">Submeter resposta</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([38.7223,-9.1393],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

var marker;

map.on('click',function(e){

if(marker){
map.removeLayer(marker);
}

marker = L.marker(e.latlng).addTo(map);

var coords = e.latlng.lat.toFixed(6)+","+e.latlng.lng.toFixed(6);

document.getElementById("coords").value = coords;

});

function enviar(){

var c = document.getElementById("coords").value;

if(c==""){
alert("Selecione um ponto no mapa");
return;
}

alert("Coordenadas registadas: "+c);

}

</script>

</body>

</html>
